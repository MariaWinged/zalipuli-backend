services:
  app:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - PORT=${PORT:-8080}
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    networks:
      - backend

  redis:
    image: redis:latest
    volumes:
      - redis_data:/data
    networks:
      - backend

volumes:
  redis_data:

networks:
  backend: